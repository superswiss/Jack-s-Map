<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GEO PUZZLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap');

  :root {
    --bg: #0a0f0d;
    --surface: #111812;
    --border: #1e2e22;
    --accent: #39ff6e;
    --accent-dim: #1a7a36;
    --warn: #ff6b35;
    --text: #d6ead9;
    --muted: #5a7360;
    --hit: #39ff6e;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 16px;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  #timer-display {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  #timer-display.warning { color: var(--warn); }

  .status-bar {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    border: 1px solid var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .pip.hit {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    border-color: var(--accent);
  }

  .pip-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex: 1;
  }

  #message {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    min-height: 1.4em;
    text-align: center;
  }

  #message.success { color: var(--accent); }
  #message.fail { color: var(--warn); }

  .buttons-grid {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .node-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.3s;
  }

  .node-card.active { border-color: var(--accent-dim); }
  .node-card.done { border-color: var(--accent); background: #0d1e11; }
  .node-card.done .node-label { color: var(--accent); }

  .node-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .node-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .node-dist {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .node-dist.close { color: var(--accent); }

  .node-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: not-allowed;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .node-btn.unlocked {
    border-color: var(--accent);
    color: var(--accent);
    cursor: pointer;
    animation: pulse 2s infinite;
  }

  .node-btn.unlocked:active {
    background: var(--accent);
    color: var(--bg);
    animation: none;
  }

  .node-btn.done-btn {
    border-color: var(--accent);
    color: var(--accent);
    cursor: default;
    animation: none;
    opacity: 0.6;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(57,255,110,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(57,255,110,0); }
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 480px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transition: width 1s linear, background 0.3s;
  }

  #progress-bar.warning { background: var(--warn); }

  #start-screen {
    width: 100%;
    max-width: 480px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
  }

  #start-screen h1 {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.1em;
    line-height: 1.3;
  }

  #start-screen p {
    color: var(--muted);
    line-height: 1.6;
    max-width: 340px;
    font-size: 13px;
  }

  #start-btn {
    padding: 14px 32px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    transition: opacity 0.2s;
  }

  #start-btn:active { opacity: 0.7; }

  #end-screen {
    display: none;
    width: 100%;
    max-width: 480px;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
  }

  #end-screen h2 {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    letter-spacing: 0.08em;
  }

  #end-screen.win h2 { color: var(--accent); }
  #end-screen.lose h2 { color: var(--warn); }

  #end-screen p { color: var(--muted); font-size: 13px; line-height: 1.6; }

  #restart-btn {
    padding: 12px 28px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  #restart-btn:active { background: var(--accent); color: var(--bg); }

  .game-ui { display: none; width: 100%; max-width: 480px; flex-direction: column; gap: 12px; flex: 1; }
  .game-ui.active { display: flex; }
</style>
</head>
<body>

<header>
  <span class="logo">GEO // PUZZLE</span>
  <span id="timer-display">1:00</span>
</header>

<!-- Start Screen -->
<div id="start-screen">
  <h1>THREE NODES<br>ONE MINUTE</h1>
  <p>Navigate to each beacon and tap it before time runs out. Nodes are ~20 yards apart. You must be within 15 yards of a node to activate it.</p>
  <button id="start-btn">BEGIN SEQUENCE</button>
</div>

<!-- Game UI -->
<div class="game-ui" id="game-ui">
  <div class="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <div class="status-bar">
    <div class="pip" id="pip-0"></div>
    <div class="pip" id="pip-1"></div>
    <div class="pip" id="pip-2"></div>
    <span class="pip-label">nodes captured</span>
  </div>

  <div id="message">Acquiring GPS signal…</div>

  <div class="buttons-grid" id="buttons-grid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- End Screen -->
<div id="end-screen">
  <h2 id="end-title"></h2>
  <p id="end-sub"></p>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const TOTAL_TIME = 60; // seconds
const HIT_RADIUS = 14; // yards (≈ 12.8m) — must be within this to activate
const YARDS_TO_METERS = 0.9144;

// Center on user's current location (Winter Springs, FL)
const CENTER_LAT = 28.6875521;
const CENTER_LNG = -81.2359313;

// Place three nodes ~20 yards apart in a triangle around the center
function offsetLatLng(lat, lng, northYards, eastYards) {
  const northM = northYards * YARDS_TO_METERS;
  const eastM  = eastYards  * YARDS_TO_METERS;
  return {
    lat: lat + (northM / 111320),
    lng: lng + (eastM  / (111320 * Math.cos(lat * Math.PI / 180)))
  };
}

const NODES = [
  { id: 0, name: 'NODE ALPHA',   ...offsetLatLng(CENTER_LAT, CENTER_LNG,  18,   0) },
  { id: 1, name: 'NODE BETA',    ...offsetLatLng(CENTER_LAT, CENTER_LNG,  -9,  16) },
  { id: 2, name: 'NODE GAMMA',   ...offsetLatLng(CENTER_LAT, CENTER_LNG,  -9, -16) },
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let gameRunning = false;
let timeLeft = TOTAL_TIME;
let timerInterval = null;
let watchId = null;
let userPos = null;
let hits = new Set();

// ─── UTILS ─────────────────────────────────────────────────────────────────
function haversineYards(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const dφ = (lat2-lat1) * Math.PI/180;
  const dλ = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a)) / YARDS_TO_METERS;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

// ─── UI ────────────────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('buttons-grid');
  grid.innerHTML = '';
  NODES.forEach(node => {
    const card = document.createElement('div');
    card.className = 'node-card';
    card.id = `card-${node.id}`;
    card.innerHTML = `
      <div class="node-header">
        <span class="node-label">${node.name}</span>
        <span class="node-dist" id="dist-${node.id}">-- yds</span>
      </div>
      <button class="node-btn" id="btn-${node.id}" disabled>OUT OF RANGE</button>
    `;
    grid.appendChild(card);
    document.getElementById(`btn-${node.id}`).addEventListener('click', () => hitNode(node.id));
  });
}

function updateCardDistances() {
  if (!userPos) return;
  NODES.forEach(node => {
    if (hits.has(node.id)) return;
    const dist = haversineYards(userPos.lat, userPos.lng, node.lat, node.lng);
    const distEl = document.getElementById(`dist-${node.id}`);
    const btnEl  = document.getElementById(`btn-${node.id}`);
    const cardEl = document.getElementById(`card-${node.id}`);
    const rounded = Math.round(dist);
    distEl.textContent = `${rounded} yds`;

    if (dist <= HIT_RADIUS) {
      distEl.className = 'node-dist close';
      btnEl.textContent = 'TAP TO CAPTURE';
      btnEl.className = 'node-btn unlocked';
      btnEl.disabled = false;
      cardEl.className = 'node-card active';
      setMessage(`${node.name} in range — capture it!`);
    } else {
      distEl.className = 'node-dist';
      btnEl.textContent = 'OUT OF RANGE';
      btnEl.className = 'node-btn';
      btnEl.disabled = true;
      cardEl.className = 'node-card';
    }
  });
}

function hitNode(id) {
  if (!gameRunning || hits.has(id)) return;
  const node = NODES.find(n => n.id === id);
  if (!userPos) return;
  const dist = haversineYards(userPos.lat, userPos.lng, node.lat, node.lng);
  if (dist > HIT_RADIUS) return;

  hits.add(id);
  const card = document.getElementById(`card-${id}`);
  card.className = 'node-card done';
  const btn = document.getElementById(`btn-${id}`);
  btn.textContent = '✓ CAPTURED';
  btn.className = 'node-btn done-btn';
  btn.disabled = true;
  document.getElementById(`pip-${id}`).className = 'pip hit';

  if (hits.size === 3) endGame(true);
}

function setMessage(text, cls = '') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = cls;
}

function updateTimer() {
  timeLeft--;
  const el = document.getElementById('timer-display');
  const bar = document.getElementById('progress-bar');
  el.textContent = formatTime(timeLeft);
  bar.style.width = `${(timeLeft / TOTAL_TIME) * 100}%`;

  if (timeLeft <= 15) {
    el.className = 'warning';
    bar.className = 'warning';
  }

  if (timeLeft <= 0) endGame(false);
}

// ─── GAME FLOW ─────────────────────────────────────────────────────────────
function startGame() {
  hits.clear();
  timeLeft = TOTAL_TIME;
  userPos = null;
  gameRunning = true;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('end-screen').className = '';
  document.getElementById('game-ui').className = 'game-ui active';
  document.getElementById('timer-display').textContent = formatTime(timeLeft);
  document.getElementById('timer-display').className = '';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-bar').className = '';
  [0,1,2].forEach(i => document.getElementById(`pip-${i}`).className = 'pip');

  buildCards();
  setMessage('Acquiring GPS signal…');

  timerInterval = setInterval(updateTimer, 1000);

  if (!navigator.geolocation) {
    setMessage('GPS not available on this device', 'fail');
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (gameRunning) {
        const noHitMessages = ['Move to a node to capture it.', 'Navigate to the nearest node.'];
        if (hits.size < 3) updateCardDistances();
      }
    },
    err => {
      setMessage('GPS error: ' + err.message, 'fail');
    },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
  );
}

function endGame(won) {
  gameRunning = false;
  clearInterval(timerInterval);
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);

  document.getElementById('game-ui').className = 'game-ui';
  const endScreen = document.getElementById('end-screen');

  if (won) {
    endScreen.className = 'win';
    document.getElementById('end-title').textContent = 'SEQUENCE COMPLETE';
    document.getElementById('end-sub').textContent = `All three nodes captured with ${formatTime(timeLeft)} remaining. Puzzle solved.`;
  } else {
    endScreen.className = 'lose';
    document.getElementById('end-title').textContent = 'TIME EXPIRED';
    document.getElementById('end-sub').textContent = `${hits.size} of 3 nodes captured. The sequence has reset.`;
  }
  endScreen.style.display = 'flex';
}

// ─── EVENTS ────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
});
</script>
</body>
</html>
